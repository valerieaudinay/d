<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soronice Script</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://raw.githubusercontent.com/valerieaudinay/d/refs/heads/main/SORONICE-SCRIPT.png" alt="Logo Soronice" class="logo">
            <h1>Soronice Script</h1>
        </div>
        
        <div class="search-bar">
            <input type="text" placeholder="Rechercher des scripts, des jeux...">
        </div>

        <nav>
            <button class="nav-btn">Scripts</button>
            <button class="nav-btn">Exploits</button>
            <button class="theme-toggle" onclick="changerTheme()">🌙</button>

            <button id="btn-login" class="nav-btn" onclick="ouvrirMenuAuth('login')">Connexion</button>
            <button id="btn-register" class="nav-btn secondary-btn" onclick="ouvrirMenuAuth('register')">S'inscrire</button>

            <button id="btn-favoris" class="nav-btn" style="display: none;">⭐ Favoris</button>
            <button id="btn-upload-nav" class="nav-btn accent-btn" style="display: none;" onclick="ouvrirMenuUpload()">Upload Script</button>
            <button id="btn-logout" class="nav-btn" style="display: none; color: #ff4d4d;" onclick="seDeconnecter()">Déconnexion</button>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <h2 class="hero-title">Découvrez, partagez et créez des scripts...</h2>
            <p class="hero-subtitle">La plateforme ultime pour les scripts Roblox.</p>
            <div class="hero-buttons">
                <button class="hero-btn accent-btn" onclick="ouvrirMenuUpload()">Upload Script</button>
                <button class="hero-btn secondary-btn">Télécharger l'App</button>
            </div>
        </section>

        <section class="stats-section">
            <div class="stat-box">
                <h3>Scripts</h3>
                <p id="stat-scripts">200,612</p>
            </div>
            <div class="stat-box">
                <h3>Vues Totales</h3>
                <p id="stat-views">176,140,891</p>
            </div>
            <div class="stat-box">
                <h3>Utilisateurs</h3>
                <p id="stat-users">185,200</p>
            </div>
        </section>
    </main>

    <div id="modal-auth" class="modal-cache">
        <div class="modal-contenu auth-contenu">
            <span class="fermer-modal" onclick="fermerMenuAuth()">×</span>
            
            <div class="auth-tabs">
                <button id="tab-login" class="auth-tab active" onclick="changerOngletAuth('login')">Connexion</button>
                <button id="tab-register" class="auth-tab" onclick="changerOngletAuth('register')">S'inscrire</button>
            </div>

            <form id="form-login" onsubmit="seConnecter(event)">
                <div class="form-group">
                    <label>Email ou Pseudo</label>
                    <input type="text" placeholder="Entrez votre pseudo..." required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="submit-btn auth-submit">Se Connecter</button>
            </form>

            <form id="form-register" style="display: none;" onsubmit="seConnecter(event)">
                <div class="form-group">
                    <label>Pseudo</label>
                    <input type="text" placeholder="Votre nom d'utilisateur..." required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="votre@email.com" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="submit-btn auth-submit">Créer mon compte</button>
            </form>
        </div>
    </div>

    <div id="modal-upload" class="modal-cache">
        <div class="modal-contenu">
            <span class="fermer-modal" onclick="fermerMenuUpload()">×</span>
            <h2 class="modal-title">Upload Script</h2>
            <form id="formulaire-upload">
                <div class="form-row">
                    <div class="form-group">
                        <label>Title <span class="required">*</span></label>
                        <input type="text" placeholder="Auto Farm, ESP, Aimbot..." required>
                    </div>
                    <div class="form-group">
                        <label>Game <span class="required">*</span></label>
                        <input type="text" placeholder="Search a game..." required>
                    </div>
                </div>
                <div class="form-group full-width">
                    <label>Cover Image</label>
                    <input type="file" accept="image/*" required>
                </div>
                <div class="form-group full-width code-section">
                    <label>Code <span class="required">*</span></label>
                    <textarea class="code-editor" rows="6" placeholder='print("Hello World")' required></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="submit-btn">Publish Script</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soronice Script </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://raw.githubusercontent.com/valerieaudinay/d/refs/heads/main/SORONICE-SCRIPT.png" alt="Logo Soronice" class="logo">
            <h1>Soronice Script </h1>
        </div>
        
        <div class="search-bar">
            <input type="text" placeholder="Search for scripts, games, or creators...">
        </div>

        <nav>
            <button class="nav-btn">Scripts</button>
            <button class="nav-btn">Exploits</button>
            <button class="nav-btn">Discord</button>
            <button class="nav-btn accent-btn" onclick="ouvrirMenuUpload()">Upload Script</button>
            <button class="theme-toggle" onclick="changerTheme()">🌙</button>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <h2 class="hero-title">Discover, share and create scripts...</h2>
            <p class="hero-subtitle">The ultimate platform for Roblox scripts.</p>
            <div class="hero-buttons">
                <button class="hero-btn primary-btn" onclick="ouvrirMenuUpload()">Upload Script</button>
                <button class="hero-btn secondary-btn">Download App</button>
            </div>
        </section>

        <section class="stats-section">
            <div class="stat-box">
                <h3>Scripts</h3>
                <p id="stat-scripts">200,612</p>
            </div>
            <div class="stat-box">
                <h3>Total Views</h3>
                <p id="stat-views">176,140,891</p>
            </div>
            <div class="stat-box">
                <h3>Total Users</h3>
                <p id="stat-users">185,200</p>
            </div>
        </section>
    </main>

    <div id="modal-upload" class="modal-cache">
        <div class="modal-contenu">
            <span class="fermer-modal" onclick="fermerMenuUpload()">×</span>
            <h2 class="modal-title">Upload Script</h2>
            
            <form id="formulaire-upload">
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Title <span class="required">*</span></label>
                        <input type="text" placeholder="Auto Farm, ESP, Aimbot..." required>
                    </div>
                    <div class="form-group">
                        <label>Game <span class="required">*</span></label>
                        <input type="text" placeholder="Search a game..." required>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>Description <span class="required">*</span></label>
                    <div class="rich-text-editor">
                        <div class="toolbar">
                            <button type="button"><b>B</b></button>
                            <button type="button"><i>I</i></button>
                            <button type="button"><u>U</u></button>
                            <button type="button">🔗</button>
                            <button type="button">📷</button>
                            <button type="button">📄</button>
                        </div>
                        <textarea rows="5" placeholder="Write a detailed description of your script here..." required></textarea>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Features</label>
                        <input type="text" placeholder="Add features (press Enter)">
                    </div>
                    <div class="form-group">
                        <label>Tags</label>
                        <input type="text" placeholder="Add tags (press Enter)">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>YouTube Video</label>
                        <input type="url" placeholder="https://youtube.com/watch?v=...">
                    </div>
                    <div class="form-group toggle-group">
                        <label>Require Key</label>
                        <label class="switch">
                            <input type="checkbox" id="key-toggle" onchange="toggleKeyLink()">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <div class="form-group full-width" id="key-link-group" style="display: none;">
                    <label>Key Link</label>
                    <input type="url" placeholder="https://linkvertise.com/...">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Type</label>
                        <select>
                            <option value="free">Free</option>
                            <option value="paid">Paid</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Visibility</label>
                        <select>
                            <option value="public">Public</option>
                            <option value="unlisted">Unlisted</option>
                            <option value="private">Private</option>
                        </select>
                    </div>
                </div>

                <div class="form-group full-width code-section">
                    <label>Code <span class="required">*</span></label>
                    <textarea class="code-editor" rows="8" placeholder='print("Hello World")' required></textarea>
                </div>

                <div class="form-group full-width">
                    <label>Commit Message <span class="required">*</span></label>
                    <input type="text" placeholder="Initial release" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="submit-btn">Publish Script</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

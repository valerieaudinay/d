<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soronice Script </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://raw.githubusercontent.com/valerieaudinay/d/refs/heads/main/SORONICE-SCRIPT.png" alt="Logo Soronice" class="logo">
            <h1>Soronice Script </h1>
        </div>
        
        <div class="search-bar">
            <input type="text" placeholder="Rechercher un script, un jeu...">
        </div>

        <nav>
            <button class="nav-btn">Accueil</button>
            <button class="nav-btn">Trending</button>
            <button class="nav-btn">Règles</button>
            <button class="nav-btn upload-btn" onclick="ouvrirMenuUpload()">Publier</button>
            <button class="theme-toggle" onclick="changerTheme()">🌙</button>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <h2>Trouvez et partagez les meilleurs scripts</h2>
            <button class="main-upload-btn" onclick="ouvrirMenuUpload()">Créer / Publier un Script</button>
        </section>

        <section class="stats-section">
            <div class="stat-box">
                <h3>Scripts Disponibles</h3>
                <p id="total-scripts">Chargement...</p>
            </div>
            <div class="stat-box">
                <h3>Joueurs en Ligne</h3>
                <p id="online-users">Chargement...</p>
            </div>
        </section>

        <section class="scripts-list">
            <div class="script-card">
                <img src="https://via.placeholder.com/300x150" alt="Image du script">
                <h3>Auto-Farm Ultime</h3>
                <p>Créé par Admin</p>
            </div>
            </section>
    </main>

    <div id="modal-upload" class="modal-cache">
        <div class="modal-contenu">
            <span class="fermer-modal" onclick="fermerMenuUpload()">×</span>
            <h2>Mettre en ligne un Script</h2>
            
            <form id="formulaire-upload">
                <label>Titre</label>
                <input type="text" placeholder="Nom de ton script" required>

                <label>Jeu cible (ou Multiversel)</label>
                <input type="text" placeholder="Ex: Blox Fruits, Arsenal, Universal...">

                <label>Image de présentation</label>
                <input type="file" accept="image/*" required>

                <label>Lien de la clé (Optionnel)</label>
                <input type="url" placeholder="https://lien-de-ta-cle.com">

                <label>Lien Discord (Optionnel)</label>
                <input type="url" placeholder="https://discord.gg/...">

                <label>Description</label>
                <textarea rows="4" placeholder="Explique ce que fait ton script..."></textarea>

                <label>Tags (Séparés par des virgules)</label>
                <input type="text" placeholder="autofarm, esp, aimbot...">

                <label>Prix</label>
                <select>
                    <option value="gratuit">Gratuit</option>
                    <option value="payant">Payant</option>
                </select>

                <label>Code du Script (Colle ton Lua ici)</label>
                <textarea rows="6" placeholder="local Player = game.Players.LocalPlayer..." required></textarea>

                <label>Commit Message (Mise à jour)</label>
                <input type="text" placeholder="Ex: Sortie initiale, Correction de bugs...">

                <label>Visibilité</label>
                <select>
                    <option value="public">Public (Tout le monde peut voir)</option>
                    <option value="unlisted">Non répertorié (Lien direct uniquement)</option>
                    <option value="private">Privé (Seulement toi)</option>
                </select>

                <button type="submit" class="submit-btn">Publier le Script</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
